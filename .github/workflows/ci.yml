name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui:
    name: UI — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Use a placeholder so the build succeeds without a real API server
          NEXT_PUBLIC_API_BASE: http://localhost:3001/api

  backend:
    name: Backend — type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # @contentengine/* deps are file: references to sibling repos not present
        # in CI. Strip them before installing so npm does not fail on missing paths.
        # Ambient stubs in src/types/contentengine-stubs.d.ts satisfy TypeScript.
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.dependencies = Object.fromEntries(
              Object.entries(p.dependencies || {}).filter(([, v]) => !String(v).startsWith('file:'))
            );
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "
          npm install --ignore-scripts --no-package-lock

      - name: Type-check
        # tsconfig.ci.json extends the main tsconfig but sets noImplicitAny:false
        # to suppress cascading implicit-any errors that stubs cause on method results.
        run: npx tsc -p tsconfig.ci.json --noEmit --skipLibCheck
